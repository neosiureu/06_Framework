<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 안내</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { max-width: 150px; height: auto; } /* 로고 이미지 크기 조정 */
        .content { margin-bottom: 20px; }
        .temp-password { font-size: 20px; font-weight: bold; color: #007bff; text-align: center; margin: 20px 0; padding: 10px; border: 1px dashed #007bff; background-color: #e9f5ff; }
        .footer { text-align: center; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="cid:logo" alt="로고"> <h2>비밀번호 재설정 안내</h2>
        </div>
        <div class="content">
            <p>안녕하세요.</p>
            <p>비밀번호 찾기를 요청하셨습니다. 아래는 새로 생성된 임시 비밀번호입니다.</p>
            
            <div class="temp-password">
                [[${tempPassword}]] </div>
            
            <p>임시 비밀번호로 로그인하신 후, 반드시 [마이페이지] 또는 [계정 설정] 등에서 비밀번호를 변경해 주시기 바랍니다.</p>
            <p>본인이 요청하지 않은 경우, 이 이메일을 무시해 주십시오.</p>
        </div>
        <div class="footer">
            <p>&copy; [[${#dates.year(#dates.createNow())}]] [귀하의 회사/사이트 이름]. 모든 권리 보유.</p> <p>이 메일은 발신 전용입니다.</p>
        </div>
    </div>
</body>
</html>
