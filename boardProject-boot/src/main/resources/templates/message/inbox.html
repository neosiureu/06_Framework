<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>받은 쪽지함</title>
  <link rel="stylesheet" href="/css/message/inbox.css"> <!-- 필요시 추가 -->
</head>
<body>

  <main>
    <h2>받은 쪽지함</h2>

    <table border="1">
      <thead>
        <tr>
          <th>보낸 사람</th>
          <th>제목</th>
          <th>보낸 날짜</th>
          <th colspan="2">읽음 여부</th>
         
        </tr>
      </thead>
      <tbody>
        <tr th:each="message : ${messageList}">
          <td th:text="${message.senderNickname}">보낸사람 닉네임</td>
          <td>
            <a th:href="@{/message/detail/{messageNo}(messageNo=${message.messageNo})}"
               th:text="${message.content}">
              제목
            </a>
          </td>
          <td th:text="${message.sendDate}">보낸시간</td>
          <td th:text="${message.readFl == 'Y' ? '읽음' : '안읽음'}">읽음 여부</td>
          <td>
            <a th:href="@{/message/send/{memberNo}(memberNo=${message.senderNo})}">답장</a>
          </td>
        </tr>
      
        <tr th:if="${#lists.isEmpty(messageList)}">
          <td colspan="4">받은 쪽지가 없습니다.</td>
        </tr>
      </tbody>
    </table>

    <br>
    <a href="/">홈으로 돌아가기</a>
  </main>

</body>
</html>
