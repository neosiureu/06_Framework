<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${todo.todoTitle}">할 일 제목</title>
  <link rel="stylesheet" href="/css/detail.css">
</head>
<body>
  <h3 th:text="${todo.todoTitle}">할 일 제목</h3>

  <table border="1">
    <tr>
      <th>번호</th>
      <td th:text="${todo.todoNo}">할 일 번호</td>
    </tr>

    <tr>
      <th>등록 날짜</th>
      <td>[[${todo.regDate}]]</td>
    </tr>

    <tr>
      <th>완료 여부</th>
      <td>
        <button type="button"
          class="complete-btn"
          th:text="${todo.complete}"
          th:data-todo-no="${todo.todoNo}">완료 여부</button>
<!-- 

data-*속성: 사용자 정의 속성으로 데이터에 대한 확장성을 고려하여 설계된 속성
 
js에서 요소.dataset을 이용해 해당 값을 얻어갈 수  있다. 

여기서는 todoNo 자체를 JS단에서 얻을 수 있음

-->

      </td>
    </tr>
    
    <tr>
      <th>내용</th>
      <td class="todo-content" th:text="${todo.todoContent}"></td>
    </tr>
  </table>

  <button id="goToList">목록으로</button>
  <button id="updateBtn" th:data-todo-no="${todo.todoNo}">수정</button>
  <!-- 수정 버튼을 클릭하면 새로운 수정 화면으로 간다 -->

  <button id="deleteBtn" th:data-todo-no="${todo.todoNo}">삭제</button>


  <th:block th:replace="~{common/footer}"></th:block>


  <!-- static폴더를 루트 삼아 spring에서 JS나 CSS같은 정적 자원에 접근할 수 있다-->
   <script src="/js/detail.js"></script>
   <!--해당 파일을 만들고 todo-->
</body>
</html>
